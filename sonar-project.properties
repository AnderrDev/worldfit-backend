# SonarCloud configuration - WorldFit Backend
# Reemplaza <TU_ORG> y <TU_PROJECT_KEY> con los valores reales de tu cuenta SonarCloud

sonar.projectKey=<TU_ORG>_worldfit-backend
sonar.organization=<TU_ORG>
sonar.projectName=WorldFit Backend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
