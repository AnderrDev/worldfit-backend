# SonarCloud configuration - WorldFit Backend
# org/projectKey rellenados para AnderrDev.
# Si SonarCloud te muestra una "organization key" distinta (a veces en minusculas),
# ajusta ambas lineas con el valor exacto que veas en la UI.

sonar.projectKey=AnderrDev_worldfit-backend
sonar.organization=AnderrDev
sonar.projectName=WorldFit Backend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
