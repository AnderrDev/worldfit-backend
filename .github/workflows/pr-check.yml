name: PR Validation - Backend

on:
  pull_request:
    branches: [dev, test, main]

jobs:
  validate-branch:
    name: Validar origen del PR segun rama destino
    runs-on: ubuntu-latest
    steps:
      - name: Reglas de flujo (dev -> test -> main)
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          echo "PR: $HEAD -> $BASE"
          case "$BASE" in
            test)
              if [ "$HEAD" != "dev" ]; then
                echo "::error::PRs a 'test' deben venir desde 'dev'. Recibido: '$HEAD'"
                exit 1
              fi
              ;;
            main)
              if [ "$HEAD" != "test" ]; then
                echo "::error::PRs a 'main' deben venir desde 'test'. Recibido: '$HEAD'"
                exit 1
              fi
              ;;
            dev)
              echo "PR a 'dev' permitido desde cualquier feature branch"
              ;;
          esac
